spring:
  application:
    name: commute-routes-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:commute_routes}
    username: ${DB_USERNAME:commute_routes}
    password: ${DB_PASSWORD:commute_routes}
  jackson:
    time-zone: Asia/Seoul

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:5173}
